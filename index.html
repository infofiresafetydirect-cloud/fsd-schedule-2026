<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>FSD Schedule 2026</title>
  <style>
    html,body {
      margin:0;
      min-height:100%;
      background:#f8fafc;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body {
      display:grid;
      place-items:center;
      color:#991b1b;
    }
    .loader {
      width:min(360px,90vw);
      text-align:center;
      padding:24px;
      border-radius:24px;
      background:#fff;
      box-shadow:0 18px 44px rgba(15,23,42,.12);
    }
    .logo {
      width:62px;
      height:62px;
      margin:0 auto 12px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:linear-gradient(145deg,#e11d48,#991b1b);
      color:#fff;
      font-weight:950;
      font-size:22px;
    }
    .loader strong {
      display:block;
      font-size:20px;
      margin-bottom:5px;
    }
    .loader span {
      color:#64748b;
      font-weight:750;
      font-size:14px;
    }
  </style>
  <script>
    // C92d silent bridge:
    // Do not render the old Schedule GitHub shell/menu first.
    // Go straight to the deployed Schedule Apps Script page.
    (function() {
      var APP_URL = 'https://script.google.com/macros/s/AKfycby2uVTbKcVJ18PW7uhzOav7aI8qzuol6jMPd61RI1XAysK-KFkeIrgz1wrfz91uGqB1Wg/exec';
      var params = new URLSearchParams(window.location.search || '');
      var page = (params.get('page') || 'home').trim() || 'home';
      var sep = APP_URL.indexOf('?') === -1 ? '?' : '&';
      var target =
        APP_URL +
        sep +
        'page=' + encodeURIComponent(page) +
        '&shell=github&directSchedule=1&v=92d&ts=' + Date.now();

      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="loader">
    <div class="logo">FSD</div>
    <strong>Opening Schedule</strong>
    <span>Loading FSD Schedule 2026...</span>
  </div>
</body>
</html>
